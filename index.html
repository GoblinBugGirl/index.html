<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ant Ecosystem Simulator</title>
<link rel="icon" type="image/png" href="ant.png">

<meta property="og:title" content="Ant Ecosystem Simulator">
<meta property="og:description" content="A living evolving ant ecosystem with wars, disasters, Twitch interaction and genetic evolution.">
<meta property="og:image" content="https://goblinbuggirl.github.io/preview.png">
<meta property="og:type" content="website">

<script src="https://unpkg.com/tmi.js@1.8.5/dist/tmi.min.js"></script>

<style>

body{
margin:0;
background:#1b1b1b;
overflow:hidden;
font-family:monospace;
}

canvas{
position:absolute;
top:0;
left:0;
background:#d2b48c;
}

#overlay{
position:absolute;
top:10px;
left:10px;
display:flex;
gap:10px;
color:white;
}

.panel{
background:rgba(0,0,0,0.65);
padding:10px;
border-radius:6px;
min-width:180px;
}

#eventFeed{
max-height:150px;
overflow:hidden;
font-size:12px;
}

</style>
</head>

<body>

<canvas id="sim"></canvas>

<div id="overlay">

<div class="panel">
<b>Ecosystem</b>
<div id="time">Time</div>
<div id="colonies">Colonies</div>
<div id="population">Population</div>
</div>

<div class="panel">
<b>Events</b>
<div id="eventFeed"></div>
</div>

</div>

<script>

/* ================= CANVAS ================= */

const canvas=document.getElementById("sim")
const ctx=canvas.getContext("2d")

let WIDTH,HEIGHT

function resize(){
WIDTH=window.innerWidth
HEIGHT=window.innerHeight
canvas.width=WIDTH
canvas.height=HEIGHT
initPheromones()
}

window.addEventListener("resize",resize)
resize()

/* ================= CAMERA ================= */

let camera={x:0,y:0,zoom:1,targetX:0,targetY:0,targetZoom:1}
let cameraTargets=[]

function addCameraTarget(x,y,z=2,t=400){
cameraTargets.push({x,y,z,t})
}

function updateCamera(){

if(cameraTargets.length){

let c=cameraTargets[0]

camera.targetX=c.x
camera.targetY=c.y
camera.targetZoom=c.z

c.t--

if(c.t<=0)cameraTargets.shift()

}else{

camera.targetX=WIDTH/2
camera.targetY=HEIGHT/2
camera.targetZoom=0.7

}

camera.x+=(camera.targetX-camera.x)*0.05
camera.y+=(camera.targetY-camera.y)*0.05
camera.zoom+=(camera.targetZoom-camera.zoom)*0.05

}

/* ================= EVENTS ================= */

function addEvent(txt){

const feed=document.getElementById("eventFeed")

let e=document.createElement("div")
e.textContent=txt

feed.prepend(e)

if(feed.children.length>6)
feed.removeChild(feed.lastChild)

}

/* ================= PHEROMONES ================= */

const PHEROMONE_SIZE=20
let pheromones=[]

function initPheromones(){

let cols=Math.ceil(WIDTH/PHEROMONE_SIZE)
let rows=Math.ceil(HEIGHT/PHEROMONE_SIZE)

pheromones=new Array(cols)

for(let x=0;x<cols;x++)
pheromones[x]=new Float32Array(rows)

}

function evaporate(){

for(let x=0;x<pheromones.length;x++)
for(let y=0;y<pheromones[x].length;y++)
pheromones[x][y]*=0.995

}

/* ================= FOOD ================= */

class Food{

constructor(x,y){
this.x=x
this.y=y
}

draw(){
ctx.fillStyle="green"
ctx.beginPath()
ctx.arc(this.x,this.y,4,0,Math.PI*2)
ctx.fill()
}

}

let foods=[]

function spawnFoodCluster(){

let x=Math.random()*WIDTH
let y=Math.random()*HEIGHT

for(let i=0;i<15;i++){

foods.push(new Food(
x+(Math.random()*60-30),
y+(Math.random()*60-30)
))

}

addEvent("🍄 Food cluster appeared")

addCameraTarget(x,y,2,250)

}

/* ================= ANT ================= */

const ANT_MAX_AGE=15000

class Ant{

constructor(x,y,colony){

this.x=x
this.y=y
this.colony=colony

this.speed=colony.speed
this.dir=Math.random()*Math.PI*2

this.carry=false
this.age=0

}

follow(){

let gx=Math.floor(this.x/PHEROMONE_SIZE)
let gy=Math.floor(this.y/PHEROMONE_SIZE)

let best=0
let bestDir=this.dir

for(let dx=-1;dx<=1;dx++)
for(let dy=-1;dy<=1;dy++){

let x=gx+dx
let y=gy+dy

if(pheromones[x] && pheromones[x][y] !== undefined && pheromones[x][y]>best){

best=pheromones[x][y]
bestDir=Math.atan2(dy,dx)

}

}

if(best>0)
this.dir+=(bestDir-this.dir)*0.25

}

move(){

this.age++

if(Math.random()<this.colony.explore)
this.dir+=(Math.random()-0.5)

this.follow()

this.x+=Math.cos(this.dir)*this.speed
this.y+=Math.sin(this.dir)*this.speed

if(this.x<0||this.x>WIDTH)this.dir=Math.PI-this.dir
if(this.y<0||this.y>HEIGHT)this.dir=-this.dir

/* deposit pheromone */

let gx=Math.floor(this.x/PHEROMONE_SIZE)
let gy=Math.floor(this.y/PHEROMONE_SIZE)

if(pheromones[gx] && pheromones[gx][gy] !== undefined)
pheromones[gx][gy]+=0.2

}

draw(){

ctx.fillStyle=this.colony.color

ctx.beginPath()
ctx.arc(this.x,this.y,3,0,Math.PI*2)
ctx.fill()

if(this.carry){

ctx.fillStyle="green"

ctx.beginPath()
ctx.arc(this.x+3,this.y,2,0,Math.PI*2)
ctx.fill()

}

}

}

/* ================= GENETICS ================= */

function mutate(v,amount){
return v+(Math.random()*amount*2-amount)
}

/* ================= COLONY ================= */

class Colony{

constructor(x,y,traits=null){

this.x=x
this.y=y

if(traits){

this.speed=mutate(traits.speed,0.1)
this.explore=mutate(traits.explore,0.1)
this.aggression=mutate(traits.aggression,0.1)

}else{

this.speed=1+Math.random()*0.4
this.explore=0.2+Math.random()*0.3
this.aggression=Math.random()

}

this.color=`hsl(${Math.random()*360},70%,50%)`

this.ants=[]

for(let i=0;i<20;i++)
this.ants.push(new Ant(x,y,this))

addEvent("👑 New colony founded")

}

update(){

for(let i=this.ants.length-1;i>=0;i--){

let a=this.ants[i]

a.move()

if(a.age>ANT_MAX_AGE){
this.ants.splice(i,1)
continue
}

for(let j=foods.length-1;j>=0;j--){

let f=foods[j]

let d=Math.hypot(a.x-f.x,a.y-f.y)

if(d<6 && !a.carry){

a.carry=true
foods.splice(j,1)

addCameraTarget(a.x,a.y,2.5,200)

}

}

if(a.carry){

let dx=this.x-a.x
let dy=this.y-a.y

let dist=Math.hypot(dx,dy)

if(dist<10){

a.carry=false

if(Math.random()<0.5)
this.ants.push(new Ant(this.x,this.y,this))

}else{

a.x+=dx/dist*a.speed*2
a.y+=dy/dist*a.speed*2

}

}

}

}

draw(){

ctx.fillStyle="#8B0000"

ctx.beginPath()
ctx.arc(this.x,this.y,6,0,Math.PI*2)
ctx.fill()

this.ants.forEach(a=>a.draw())

}

}

/* ================= ECOSYSTEM ================= */

let colonies=[]
let simTime=0

function spawnColony(parent=null){

let x=Math.random()*WIDTH
let y=Math.random()*HEIGHT

if(parent)
colonies.push(new Colony(x,y,parent))
else
colonies.push(new Colony(x,y))

addCameraTarget(x,y,2.5,300)

}

function ecosystemUpdate(){

simTime++

evaporate()

colonies.forEach(c=>c.update())

if(Math.random()<0.003)
spawnFoodCluster()

if(Math.random()<0.0006 && colonies.length>0){

let parent=colonies[Math.floor(Math.random()*colonies.length)]

spawnColony(parent)

addEvent("🧬 Mutation colony emerged")

}

colonies=colonies.filter(c=>c.ants.length>0)

}

/* ================= DRAW ================= */

function draw(){

ctx.clearRect(0,0,WIDTH,HEIGHT)

ctx.save()

ctx.translate(WIDTH/2,HEIGHT/2)
ctx.scale(camera.zoom,camera.zoom)
ctx.translate(-camera.x,-camera.y)

foods.forEach(f=>f.draw())
colonies.forEach(c=>c.draw())

ctx.restore()

}

/* ================= UI ================= */

function updateUI(){

let pop=0
colonies.forEach(c=>pop+=c.ants.length)

document.getElementById("time").textContent="Time: "+Math.floor(simTime/60)+"s"
document.getElementById("colonies").textContent="Colonies: "+colonies.length
document.getElementById("population").textContent="Population: "+pop

}

/* ================= TWITCH ================= */

function startTwitch(channel){

const client=new tmi.Client({
connection:{reconnect:true},
channels:[channel]
})

client.connect()

client.on("message",(ch,tags,msg,self)=>{

if(self)return

if(msg==="!feed"){

spawnFoodCluster()

addEvent(tags.username+" fed the ants")

}

})

}

startTwitch("goblinbuggirl")

/* ================= LOOP ================= */

function loop(){

ecosystemUpdate()
updateCamera()
draw()
updateUI()

requestAnimationFrame(loop)

}

spawnColony()
spawnColony()
spawnFoodCluster()

loop()

</script>
</body>
</html>
