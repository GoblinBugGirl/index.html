<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ant Ecosystem Simulator</title>

<style>
body{
margin:0;
background:#1b1b1b;
overflow:hidden;
font-family:monospace;
}

canvas{
position:absolute;
top:0;
left:0;
background:#d2b48c;
}

#overlay{
position:absolute;
top:10px;
left:10px;
display:flex;
gap:10px;
color:white;
}

.panel{
background:rgba(0,0,0,0.65);
padding:10px;
border-radius:6px;
min-width:200px;
}

#eventFeed{
max-height:150px;
overflow:hidden;
font-size:12px;
}
</style>
</head>

<body>

<canvas id="sim"></canvas>

<div id="overlay">

<div class="panel">
<b>Ecosystem</b>
<div id="time">Time</div>
<div id="colonies">Colonies</div>
<div id="population">Population</div>
<div id="dominant"></div>
</div>

<div class="panel">
<b>Events</b>
<div id="eventFeed"></div>
</div>

</div>

<script>

const canvas=document.getElementById("sim")
const ctx=canvas.getContext("2d")

let WIDTH
let HEIGHT

function resize(){
WIDTH=window.innerWidth
HEIGHT=window.innerHeight
canvas.width=WIDTH
canvas.height=HEIGHT
}

window.addEventListener("resize",resize)
resize()

class Food{
constructor(x,y){
this.x=x
this.y=y
}

draw(){
ctx.fillStyle="green"
ctx.beginPath()
ctx.arc(this.x,this.y,4,0,Math.PI*2)
ctx.fill()
}
}

let foods=[]

function spawnFoodCluster(){

let x=Math.random()*WIDTH
let y=Math.random()*HEIGHT

for(let i=0;i<15;i++){
foods.push(new Food(
x+(Math.random()*60-30),
y+(Math.random()*60-30)
))
}

addEvent("🍄 Food appeared")

}

class Ant{

constructor(x,y,colony){

this.x=x
this.y=y
this.colony=colony

this.speed=colony.speed
this.dir=Math.random()*Math.PI*2
this.age=0

}

move(){

this.age++

this.dir+=(Math.random()-0.5)*this.colony.explore

this.x+=Math.cos(this.dir)*this.speed
this.y+=Math.sin(this.dir)*this.speed

if(this.x<0||this.x>WIDTH)this.dir=Math.PI-this.dir
if(this.y<0||this.y>HEIGHT)this.dir=-this.dir

}

draw(){

ctx.fillStyle=this.colony.color

ctx.beginPath()
ctx.arc(this.x,this.y,3,0,Math.PI*2)
ctx.fill()

}

}

function mutate(v,a){
return v+(Math.random()*a*2-a)
}

const colonyNames=[
"Red Fang","Iron Hill","Emerald Swarm",
"Dust Empire","Golden Legion","Silent Hive"
]

class Colony{

constructor(x,y,traits=null){

this.x=x
this.y=y

this.name=colonyNames[Math.floor(Math.random()*colonyNames.length)]

if(traits){

this.speed=mutate(traits.speed,0.1)
this.explore=mutate(traits.explore,0.1)
this.aggression=mutate(traits.aggression,0.1)

}else{

this.speed=1+Math.random()*0.4
this.explore=0.2+Math.random()*0.3
this.aggression=Math.random()

}

this.color=`hsl(${Math.random()*360},70%,50%)`

this.ants=[]

for(let i=0;i<20;i++){
this.ants.push(new Ant(x,y,this))
}

addEvent("👑 Colony founded: "+this.name)

}

update(){

for(let i=this.ants.length-1;i>=0;i--){

let a=this.ants[i]

a.move()

if(a.age>15000){
this.ants.splice(i,1)
}

}

}

draw(){

ctx.fillStyle="#8B0000"

ctx.beginPath()
ctx.arc(this.x,this.y,6,0,Math.PI*2)
ctx.fill()

this.ants.forEach(a=>a.draw())

}

}

function handleAntWars(){

for(let i=0;i<colonies.length;i++){
for(let j=i+1;j<colonies.length;j++){

let c1=colonies[i]
let c2=colonies[j]

for(let a=c1.ants.length-1;a>=0;a--){
for(let b=c2.ants.length-1;b>=0;b--){

let ant1=c1.ants[a]
let ant2=c2.ants[b]

let d=Math.hypot(ant1.x-ant2.x,ant1.y-ant2.y)

if(d<6){

if(Math.random()<0.02){

if(Math.random()<c1.aggression){
c2.ants.splice(b,1)
}else{
c1.ants.splice(a,1)
}

}

}

}

}

}

}

}

let colonies=[]
let simTime=0

function spawnColony(parent=null){

let x=Math.random()*WIDTH
let y=Math.random()*HEIGHT

if(parent){
colonies.push(new Colony(x,y,parent))
}else{
colonies.push(new Colony(x,y))
}

}

function ecosystemUpdate(){

simTime++

colonies.forEach(c=>c.update())

handleAntWars()

if(Math.random()<0.003){
spawnFoodCluster()
}

if(Math.random()<0.0006 && colonies.length>0){

let parent=colonies[Math.floor(Math.random()*colonies.length)]

spawnColony(parent)

addEvent("🧬 Mutation colony emerged")

}

colonies=colonies.filter(c=>c.ants.length>0)

}

function draw(){

ctx.clearRect(0,0,WIDTH,HEIGHT)

foods.forEach(f=>f.draw())
colonies.forEach(c=>c.draw())

}

function getDominant(){

let best=null
let size=0

colonies.forEach(c=>{
if(c.ants.length>size){
size=c.ants.length
best=c
}
})

return best

}

function updateUI(){

let pop=0

colonies.forEach(c=>{
pop+=c.ants.length
})

document.getElementById("time").textContent="Time: "+Math.floor(simTime/60)+"s"
document.getElementById("colonies").textContent="Colonies: "+colonies.length
document.getElementById("population").textContent="Population: "+pop

let dom=getDominant()

if(dom){

document.getElementById("dominant").textContent=
"Dominant: "+dom.name+
" Speed:"+dom.speed.toFixed(2)+
" Explore:"+dom.explore.toFixed(2)+
" Aggro:"+dom.aggression.toFixed(2)

}

}

function addEvent(txt){

const feed=document.getElementById("eventFeed")

let e=document.createElement("div")
e.textContent=txt

feed.prepend(e)

if(feed.children.length>6){
feed.removeChild(feed.lastChild)
}

}

function loop(){

ecosystemUpdate()
draw()
updateUI()

requestAnimationFrame(loop)

}

spawnColony()
spawnColony()
spawnFoodCluster()

loop()

</script>
</body>
</html>
