<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Ant Ecosystem Simulator</title>

<script src="https://unpkg.com/tmi.js@1.8.5/dist/tmi.min.js"></script>

<style>

body{
margin:0;
background:#1b1b1b;
overflow:hidden;
font-family:monospace;
}

canvas{
position:absolute;
top:0;
left:0;
background:#d2b48c;
}

#overlay{
position:absolute;
top:10px;
left:10px;
display:flex;
gap:10px;
color:white;
}

.panel{
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:6px;
min-width:150px;
}

#eventFeed{
max-height:140px;
overflow:hidden;
font-size:12px;
}

</style>
</head>

<body>

<canvas id="sim"></canvas>

<div id="overlay">

<div class="panel">
<b>Colony</b>
<div id="gen">Gen:1</div>
<div id="pop">Pop:1</div>
<div id="species">Species</div>
</div>

<div class="panel">
<b>Food</b>
<div id="food">Food:0</div>
<div id="collected">Collected:0</div>
</div>

<div class="panel">
<b>Events</b>
<div id="eventFeed"></div>
</div>

</div>

<script>

/* ================= CANVAS ================= */

const canvas=document.getElementById("sim")
const ctx=canvas.getContext("2d")

let WIDTH,HEIGHT

function resize(){
WIDTH=window.innerWidth
HEIGHT=window.innerHeight
canvas.width=WIDTH
canvas.height=HEIGHT
initPheromones()
}

window.addEventListener("resize",resize)
resize()

/* ================= CAMERA ================= */

let camera={
x:0,y:0,
zoom:1,
targetX:0,targetY:0,
targetZoom:1
}

let cameraTargets=[]

function addCameraTarget(x,y,z=2,t=400){
cameraTargets.push({x,y,z,t})
}

function updateCamera(){

if(cameraTargets.length){

let c=cameraTargets[0]

camera.targetX=c.x
camera.targetY=c.y
camera.targetZoom=c.z

c.t--

if(c.t<=0)cameraTargets.shift()

}else{

camera.targetX=WIDTH/2
camera.targetY=HEIGHT/2
camera.targetZoom=0.7

}

camera.x+=(camera.targetX-camera.x)*0.05
camera.y+=(camera.targetY-camera.y)*0.05
camera.zoom+=(camera.targetZoom-camera.zoom)*0.05

}

/* ================= EVENTS ================= */

function addEvent(txt){

const feed=document.getElementById("eventFeed")

let e=document.createElement("div")
e.textContent=txt

feed.prepend(e)

if(feed.children.length>6)
feed.removeChild(feed.lastChild)

}

/* ================= SPECIES ================= */

const speciesNames=[
"Sand Diggers",
"Red Foragers",
"Emerald Runners",
"Night Hunters",
"Tunnel Kings",
"Stone Burrowers",
"Amber Gatherers"
]

function randomSpecies(){

return{
name:speciesNames[Math.floor(Math.random()*speciesNames.length)],
color:`hsl(${Math.random()*360},70%,45%)`,
speed:1+Math.random()*0.5,
explore:0.3+Math.random()*0.4
}

}

let species=randomSpecies()

/* ================= PHEROMONES ================= */

const PHEROMONE_SIZE=20
let pheromones=[]

function initPheromones(){

let cols=Math.ceil(WIDTH/PHEROMONE_SIZE)
let rows=Math.ceil(HEIGHT/PHEROMONE_SIZE)

pheromones=new Array(cols)

for(let x=0;x<cols;x++)
pheromones[x]=new Float32Array(rows)

}

function evaporate(){

for(let x=0;x<pheromones.length;x++)
for(let y=0;y<pheromones[x].length;y++)
pheromones[x][y]*=0.996

}

/* ================= ENTITIES ================= */

const ANT_MAX_AGE=15000
const QUEEN_MAX_AGE=70000

class Food{

constructor(x,y){
this.x=x
this.y=y
}

draw(){
ctx.fillStyle="green"
ctx.beginPath()
ctx.arc(this.x,this.y,4,0,Math.PI*2)
ctx.fill()
}

}

class Ant{

constructor(x,y,type="worker",colony=0){

this.x=x
this.y=y
this.type=type
this.colony=colony

this.size=type==="queen"?8:4

this.speed=species.speed+Math.random()*0.2
this.dir=Math.random()*Math.PI*2

this.carry=false
this.age=0

this.maxAge=type==="queen"?QUEEN_MAX_AGE:ANT_MAX_AGE

}

follow(){

let gx=Math.floor(this.x/PHEROMONE_SIZE)
let gy=Math.floor(this.y/PHEROMONE_SIZE)

let best=0
let bestDir=this.dir

for(let dx=-1;dx<=1;dx++)
for(let dy=-1;dy<=1;dy++){

let x=gx+dx
let y=gy+dy

if(pheromones[x]&&pheromones[x][y]>best){

best=pheromones[x][y]
bestDir=Math.atan2(dy,dx)

}

}

if(best>0)this.dir=bestDir

}

move(){

this.age++

if(Math.random()<species.explore)
this.dir+=(Math.random()-0.5)*0.7

if(!this.carry)this.follow()

this.x+=Math.cos(this.dir)*this.speed
this.y+=Math.sin(this.dir)*this.speed

if(this.x<0||this.x>WIDTH)this.dir=Math.PI-this.dir
if(this.y<0||this.y>HEIGHT)this.dir=-this.dir

}

draw(){

ctx.fillStyle=this.type==="queen"?"#8B0000":species.color

ctx.beginPath()
ctx.arc(this.x,this.y,this.size,0,Math.PI*2)
ctx.fill()

if(this.carry){

ctx.fillStyle="green"

ctx.beginPath()
ctx.arc(this.x+3,this.y,2,0,Math.PI*2)
ctx.fill()

}

}

}

/* ================= COLONY ================= */

let ants=[]
let foods=[]

let generation=1
let collected=0

function spawnFood(x=Math.random()*WIDTH,y=Math.random()*HEIGHT){
foods.push(new Food(x,y))
}

function initColony(){

ants=[]
foods=[]

ants.push(new Ant(WIDTH/2,HEIGHT/2,"queen"))

for(let i=0;i<20;i++)
spawnFood()

addEvent("🌱 New colony founded")

}

/* ================= DISASTERS ================= */

function flood(){

addEvent("💧 Flood!")

let kill=Math.floor(ants.length*0.25)
ants.splice(0,kill)

}

function raid(){

addEvent("⚔ Rival ants raid!")

let kill=Math.floor(ants.length*0.2)
ants.splice(0,kill)

}

/* ================= EVOLUTION ================= */

function evolve(){

generation++

species=randomSpecies()

addEvent("🧬 Evolution: "+species.name)

}

/* ================= UPDATE ================= */

function update(){

evaporate()

for(let i=ants.length-1;i>=0;i--){

let a=ants[i]

a.move()

if(a.age>a.maxAge){
ants.splice(i,1)
continue
}

if(!a.carry){

for(let j=foods.length-1;j>=0;j--){

let f=foods[j]
let d=Math.hypot(a.x-f.x,a.y-f.y)

if(d<8){

a.carry=true
foods.splice(j,1)

addCameraTarget(a.x,a.y,2.5,300)

break

}

}

}else{

let queen=ants.find(x=>x.type==="queen")

if(!queen)continue

let dx=queen.x-a.x
let dy=queen.y-a.y

let dist=Math.hypot(dx,dy)

if(dist<10){

a.carry=false

collected++

if(Math.random()<0.45)
ants.push(new Ant(queen.x,queen.y))

}else{

a.x+=dx/dist*a.speed*2
a.y+=dy/dist*a.speed*2

}

let gx=Math.floor(a.x/PHEROMONE_SIZE)
let gy=Math.floor(a.y/PHEROMONE_SIZE)

if(pheromones[gx]&&pheromones[gx][gy]!=undefined)
pheromones[gx][gy]+=2

}

}

if(foods.length<30&&Math.random()<0.03)
spawnFood()

if(Math.random()<0.0005)raid()
if(Math.random()<0.0004)flood()

if(ants.length===0){

addEvent("💀 Colony collapse")

evolve()
initColony()

}

}

/* ================= DRAW ================= */

function draw(){

ctx.clearRect(0,0,WIDTH,HEIGHT)

ctx.save()

ctx.translate(WIDTH/2,HEIGHT/2)
ctx.scale(camera.zoom,camera.zoom)
ctx.translate(-camera.x,-camera.y)

foods.forEach(f=>f.draw())
ants.forEach(a=>a.draw())

ctx.restore()

}

/* ================= OVERLAY ================= */

function updateOverlay(){

document.getElementById("gen").textContent="Gen:"+generation
document.getElementById("pop").textContent="Pop:"+ants.length
document.getElementById("food").textContent="Food:"+foods.length
document.getElementById("collected").textContent="Collected:"+collected
document.getElementById("species").textContent=species.name

}

/* ================= TWITCH ================= */

function startTwitch(channel){

const client=new tmi.Client({
connection:{reconnect:true},
channels:[channel]
})

client.connect()

client.on("message",(ch,tags,msg,self)=>{

if(self)return

if(msg==="!feed"){

spawnFood()

addEvent(tags.username+" fed the ants")

addCameraTarget(Math.random()*WIDTH,Math.random()*HEIGHT,2,300)

}

})

}

/* ================= LOOP ================= */

function loop(){

update()
updateCamera()
draw()
updateOverlay()

requestAnimationFrame(loop)

}

initColony()
loop()

</script>

</body>
</html>
